<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>AI Generated Websites</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #38bdf8;
    }
    p {
      text-align: center;
      color: #94a3b8;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      transition: 0.3s;
    }
    .card:hover {
      transform: scale(1.05);
      background: #334155;
    }
    a {
      color: #22c55e;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>🌐 AI Generated Websites</h1>
  <p>New website every 2 hours 🚀</p>
  <div class='grid'>

  <div class='card'>
    <h3>2026-03-20-06-02</h3>
    <a href='2026-03-20-06-02.html'>View Website →</a>
  </div>
  

  <div class='card'>
    <h3>2026-03-20-05-55</h3>
    <a href='2026-03-20-05-55.html'>View Website →</a>
  </div>
  
</div></body></html>
