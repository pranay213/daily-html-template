name: AI Website Generator (Ecommerce + Portfolio)

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-site:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # 🔥 Generate Website (Dynamic Type)
      - name: Generate Website
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
        run: |
          mkdir -p site

          TYPES=("ecommerce" "portfolio")
          TYPE=${TYPES[$RANDOM % ${#TYPES[@]}]}

          FILENAME="${TYPE}-$(date +%Y-%m-%d-%H-%M).html"
          FILE="site/$FILENAME"

          if [ "$TYPE" = "ecommerce" ]; then
            PROMPT="Generate a modern ECOMMERCE website in pure HTML with inline CSS.
- Hero banner
- Product grid with cards
- Prices, buttons (Add to Cart)
- Navbar with logo and menu
- Clean UI (like Amazon/Shopify style)
- Responsive design
- Footer
Return ONLY HTML"
          else
            PROMPT="Generate a modern PORTFOLIO website in pure HTML with inline CSS.
- Hero section with name and intro
- About section
- Projects showcase (cards)
- Skills section
- Contact section
- Clean UI (developer portfolio style)
- Responsive design
Return ONLY HTML"
          fi

          RESPONSE=$(curl -s https://ollama.com/api/generate \
            -H "Authorization: Bearer $OLLAMA_API_KEY" \
            -H "Content-Type: application/json" \
            -d @- <<EOF
          {
            "model": "gpt-oss:120b",
            "prompt": "$PROMPT",
            "stream": false
          }
EOF
          )

          echo "$RESPONSE" | jq -r '.response' > "$FILE"

      # 🔥 Generate index.html
      - name: Generate index.html
        run: |
          echo "<!DOCTYPE html>
          <html>
          <head>
            <title>AI Websites</title>
            <style>
              body { font-family: Arial; background:#0f172a; color:white; padding:20px }
              h1 { text-align:center; color:#38bdf8 }
              .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px }
              .card { background:#1e293b; padding:20px; border-radius:10px }
              a { color:#22c55e; text-decoration:none }
            </style>
          </head>
          <body>
            <h1>🚀 AI Generated Websites</h1>
            <div class='grid'>" > site/index.html

          for f in $(ls site/*.html | sort -r); do
            name=$(basename "$f")

            if [ "$name" = "index.html" ]; then
              continue
            fi

            echo "
            <div class='card'>
              <h3>$name</h3>
              <a href='$name'>Open →</a>
            </div>
            " >> site/index.html
          done

          echo "</div></body></html>" >> site/index.html

      # 🔥 Commit
      - name: Commit and Push
        run: |
          git config --global user.name "ai-bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add .
          git commit -m "New site $(date)" || echo "No changes"
          git push
