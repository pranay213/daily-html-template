name: AI Website Generator (Every 2 Hours)

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-site:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # 🔥 Generate Website HTML
      - name: Generate Website from Ollama
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
        run: |
          mkdir -p site

          FILENAME=$(date +%Y-%m-%d-%H-%M)
          FILE="site/$FILENAME.html"

          RESPONSE=$(curl -s https://ollama.com/api/generate \
            -H "Authorization: Bearer $OLLAMA_API_KEY" \
            -H "Content-Type: application/json" \
            -d @- <<'EOF'
          {
            "model": "gpt-oss:120b",
            "prompt": "Generate a stunning modern landing page in pure HTML with inline CSS.\n\nRequirements:\n- Hero section with big heading\n- Gradient background\n- Cards / features\n- Buttons with hover effects\n- Responsive layout\n- Modern UI (glassmorphism or minimal)\n- Add footer\n- Theme should be random (startup, AI, casino, fintech, app)\n- Return ONLY HTML code",
            "stream": false
          }
          EOF
          )

          echo "$RESPONSE" | jq -r '.response' > "$FILE"

      # 🔥 Generate BEAUTIFUL index.html
      - name: Generate index.html
        run: |
          mkdir -p site

          echo "<!DOCTYPE html>
          <html lang='en'>
          <head>
            <meta charset='UTF-8'>
            <meta name='viewport' content='width=device-width, initial-scale=1.0'>
            <title>AI Generated Websites</title>
            <style>
              body {
                font-family: Arial;
                background: #0f172a;
                color: white;
                margin: 0;
                padding: 20px;
              }
              h1 {
                text-align: center;
                color: #38bdf8;
              }
              p {
                text-align: center;
                color: #94a3b8;
              }
              .grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                gap: 20px;
                margin-top: 30px;
              }
              .card {
                background: #1e293b;
                padding: 20px;
                border-radius: 12px;
                transition: 0.3s;
              }
              .card:hover {
                transform: scale(1.05);
                background: #334155;
              }
              a {
                color: #22c55e;
                text-decoration: none;
                font-weight: bold;
              }
            </style>
          </head>
          <body>
            <h1>🌐 AI Generated Websites</h1>
            <p>New website every 2 hours 🚀</p>
            <div class='grid'>" > site/index.html

          for f in $(ls site/*.html | sort -r); do
            name=$(basename "$f")

            if [ "$name" = "index.html" ]; then
              continue
            fi

            clean=$(echo "$name" | sed 's/.html//')

            echo "
            <div class='card'>
              <h3>$clean</h3>
              <a href='$name'>View Website →</a>
            </div>
            " >> site/index.html
          done

          echo "</div></body></html>" >> site/index.html

      # 🔥 Commit & Push
      - name: Commit and Push
        run: |
          git config --global user.name "ai-bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add .
          git commit -m "New AI website $(date)" || echo "No changes"
          git push
